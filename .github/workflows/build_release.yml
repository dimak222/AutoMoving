name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # ручной запуск
    inputs:
      version:
        description: 'Версия для сборки (оставьте пустым для автоопределения последнего тега)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write                # необходимо для push тегов и релизов
    env:
      PROJECT_NAME: ${{ github.event.repository.name }}  # имя репозитория
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # убирает все предупреждения Node 20
    steps:
   
      - name: Git config (long paths + symlinks)
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --global core.symlinks false

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Определяем имя проекта (из названия репозитория) и главный скрипт
      - name: Determine main script
        id: vars
        shell: bash
        run: |
          # Автоматический поиск главного скрипта
          if [ -f "${{ env.PROJECT_NAME }}.pyw" ]; then
            MAIN="${{ env.PROJECT_NAME }}.pyw"
          elif [ -f "main.pyw" ]; then
            MAIN="main.pyw"
          elif [ -f "${{ env.PROJECT_NAME }}.py" ]; then
            MAIN="${{ env.PROJECT_NAME }}.py"
          elif [ -f "main.py" ]; then
            MAIN="main.py"
          else
            echo "Error: No main script found"
            exit 1
          fi
          echo "MAIN_SCRIPT=$MAIN" >> $GITHUB_ENV

      # При ручном запуске: получаем версию (авто или из ввода)
      - name: Set version for manual run
        if: github.event_name == 'workflow_dispatch'
        id: manual_ver
        shell: bash
        run: |
          LAST_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:strip=2)' refs/tags | grep -E '^v' | head -n 1)
          if [ -n "$LAST_TAG" ]; then
            echo "Найден последний тег: $LAST_TAG"
            echo "MANUAL_VERSION=$LAST_TAG" >> $GITHUB_ENV
          else
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [ -n "$INPUT_VERSION" ]; then
              echo "Используем версию из поля ввода: $INPUT_VERSION"
              echo "MANUAL_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            else
              echo "Error: Нет ни одного тега и не указана версия в поле ввода."
              exit 1
            fi
          fi

      # При ручном запуске создаём/пересоздаём тег с определённой версией
      - name: Create or recreate tag (manual run)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.MANUAL_VERSION }}"
          echo "Используемый тег: $TAG"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"
          git fetch --tags
          git checkout "$TAG"
          echo "RECREATED_TAG=$TAG" >> $GITHUB_ENV

      # Генерация version info
      - name: Generate version info file
        shell: powershell
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              "${{ env.MANUAL_VERSION }}"
          } else {
              "${{ github.ref_name }}"
          }
          Write-Host "Using tag: $tag"
          $project = "${{ env.PROJECT_NAME }}"
          $ver = $tag -replace '^v', ''
          if ($ver -match '^(\d+\.\d+\.\d+)') {
              $base = $matches[1]
              $parts = $base.Split('.')
              $major = [int]$parts[0]
              $minor = [int]$parts[1]
              $patch = [int]$parts[2]
              $suffix = $ver.Substring($base.Length)
              $build = 0
              if ($suffix -match 'b(\d+)') { $build = [int]$matches[1] }

              $lines = @(
                  "# UTF-8",
                  "VSVersionInfo(",
                  "  ffi=FixedFileInfo(",
                  "    filevers=($major, $minor, $patch, $build),",
                  "    mask=0x3f,",
                  "    flags=0x0,",
                  "    OS=0x4,",
                  "    fileType=0x1,",
                  "    subtype=0x0,",
                  "    date=(0, 0)",
                  "  ),",
                  "  kids=[",
                  "    StringFileInfo(",
                  "      [",
                  "        StringTable(",
                  "          u'040904B0',",
                  "          [",
                  "            StringStruct(u'FileDescription', u'$project'),",
                  "            StringStruct(u'InternalName', u'$project'),",
                  "            StringStruct(u'ProductVersion', u'$tag'),",
                  "            StringStruct(u'ProductName', u'$project'),",
                  "            StringStruct(u'LegalCopyright', u'(c) dimak222')",
                  "          ]",
                  "        )",
                  "      ]",
                  "    ),",
                  "    VarFileInfo([VarStruct(u'Translation', [1049, 1033])])",
                  "  ]",
                  ")"
              )
              $content = $lines -join "`r`n"
              Set-Content -Path version_info.txt -Value $content -Encoding UTF8
          } else {
              Write-Error "Не удалось извлечь версию из тега $tag"
              exit 1
          }

      # Генерация release notes (общая для push и manual)
      - name: Generate release notes from commits
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ env.RECREATED_TAG }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "Using TAG: '$TAG'"
          if [ -z "$TAG" ]; then
            echo "Error: TAG is empty. Cannot generate release notes."
            exit 1
          fi
          # Получаем предыдущий тег (не текущий)
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:strip=2)' refs/tags | grep -E '^v' | grep -v "^$TAG$" | head -n 1)
          echo "Previous tag: '$PREV_TAG'"
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --format='%s' "$TAG" || echo "")
          else
            COMMITS=$(git log --format='%s' "$PREV_TAG..$TAG" || echo "")
          fi
          # Удаляем строки, которые являются именами тегов (например, "v26.07.1")
          COMMITS=$(echo "$COMMITS" | grep -vE '^v[0-9]+\.[0-9]+\.[0-9]+' || true)
          # Убираем ведущие номера и пробелы, перенумеровываем заново
          CLEAN=$(echo "$COMMITS" | sed 's/^[0-9]\+\. //' || true)
          NUMBERED=$(echo "$CLEAN" | awk 'NF {print NR ". " $0}' || true)
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "$NUMBERED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=icon.ico --add-data "icon.ico;." --version-file=version_info.txt --name ${{ env.PROJECT_NAME }} ${{ env.MAIN_SCRIPT }}

      # Релиз при пуше тега
      - name: Upload EXE to release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PROJECT_NAME }}.exe
          name: ${{ env.PROJECT_NAME }} ${{ github.ref_name }}
          body: ${{ env.RELEASE_BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Релиз при ручном запуске
      - name: Upload EXE to release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PROJECT_NAME }}.exe
          tag_name: ${{ env.RECREATED_TAG }}
          name: ${{ env.PROJECT_NAME }} ${{ env.RECREATED_TAG }}
          body: ${{ env.RELEASE_BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}