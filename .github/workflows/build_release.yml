name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # ручной запуск

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_NAME: ${{ github.event.repository.name }}  # имя репозитория
    steps:
   
      - name: Git config (long paths + symlinks)
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --global core.symlinks false

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Определяем имя проекта (из названия репозитория) и главный скрипт
      - name: Determine main script
        id: vars
        shell: bash
        run: |
          # Автоматический поиск главного скрипта
          if [ -f "${{ env.PROJECT_NAME }}.pyw" ]; then
            MAIN="${{ env.PROJECT_NAME }}.pyw"
          elif [ -f "main.pyw" ]; then
            MAIN="main.pyw"
          elif [ -f "${{ env.PROJECT_NAME }}.py" ]; then
            MAIN="${{ env.PROJECT_NAME }}.py"
          elif [ -f "main.py" ]; then
            MAIN="main.py"
          else
            echo "Error: No main script found"
            exit 1
          fi
          echo "MAIN_SCRIPT=$MAIN" >> $GITHUB_ENV

      # При ручном запуске пересоздаём последний тег
      - name: Recreate latest tag (manual run)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "В репозитории нет тегов. Создайте первый тег вручную (например, v1.0.0) и повторите."
            exit 1
          fi
          echo "Последний тег: $TAG"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git tag "$TAG"
          git push origin "$TAG"

          git fetch --tags
          git checkout "$TAG"

          echo "RECREATED_TAG=$TAG" >> $GITHUB_ENV

      # Генерация version info
      - name: Generate version info file
        shell: powershell
        run: |
          $envTag = "$env:RECREATED_TAG"
          if ($envTag) {
              $tag = $envTag
          } else {
              $tag = "${{ github.ref_name }}"
          }
          Write-Host "Using tag: $tag"
          $project = "${{ env.PROJECT_NAME }}"
          $ver = $tag -replace '^v', ''
          if ($ver -match '^(\d+\.\d+\.\d+)') {
              $base = $matches[1]
              $parts = $base.Split('.')
              $major = [int]$parts[0]
              $minor = [int]$parts[1]
              $patch = [int]$parts[2]
              $suffix = $ver.Substring($base.Length)
              $build = 0
              if ($suffix -match 'b(\d+)') { $build = [int]$matches[1] }

              $lines = @(
                  "# UTF-8",
                  "VSVersionInfo(",
                  "  ffi=FixedFileInfo(",
                  "    filevers=($major, $minor, $patch, $build),",
                  "    mask=0x3f,",
                  "    flags=0x0,",
                  "    OS=0x4,",
                  "    fileType=0x1,",
                  "    subtype=0x0,",
                  "    date=(0, 0)",
                  "  ),",
                  "  kids=[",
                  "    StringFileInfo(",
                  "      [",
                  "        StringTable(",
                  "          u'040904B0',",
                  "          [",
                  "            StringStruct(u'FileDescription', u'$project'),",
                  "            StringStruct(u'InternalName', u'$project'),",
                  "            StringStruct(u'ProductVersion', u'$tag'),",
                  "            StringStruct(u'ProductName', u'$project'),",
                  "            StringStruct(u'LegalCopyright', u'(c) dimak222')",
                  "          ]",
                  "        )",
                  "      ]",
                  "    ),",
                  "    VarFileInfo([VarStruct(u'Translation', [1049, 1033])])",
                  "  ]",
                  ")"
              )
              $content = $lines -join "`r`n"
              Set-Content -Path version_info.txt -Value $content -Encoding UTF8
          } else {
              Write-Error "Не удалось извлечь версию из тега $tag"
              exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=icon.ico --version-file=version_info.txt --name ${{ env.PROJECT_NAME }} ${{ env.MAIN_SCRIPT }}

      # Релиз при пуше тега
      - name: Upload EXE to release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PROJECT_NAME }}.exe
          name: ${{ env.PROJECT_NAME }} ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Релиз при ручном запуске
      - name: Upload EXE to release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PROJECT_NAME }}.exe
          tag_name: ${{ env.RECREATED_TAG }}
          name: ${{ env.PROJECT_NAME }} ${{ env.RECREATED_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}